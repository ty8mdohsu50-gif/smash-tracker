<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <!-- 背景 -->
  <rect width="1200" height="630" fill="#0F0F23"/>

  <!-- 上部アクセントライン -->
  <rect x="0" y="0" width="1200" height="4" fill="#7C3AED"/>

  <!-- 下部アクセントライン -->
  <rect x="0" y="626" width="1200" height="4" fill="#7C3AED"/>

  <!-- 左側のデコレーション -->
  <rect x="80" y="80" width="4" height="470" fill="#7C3AED" opacity="0.6"/>
  <rect x="92" y="80" width="2" height="470" fill="#7C3AED" opacity="0.3"/>

  <!-- 右側のデコレーション -->
  <rect x="1116" y="80" width="4" height="470" fill="#7C3AED" opacity="0.6"/>
  <rect x="1106" y="80" width="2" height="470" fill="#7C3AED" opacity="0.3"/>

  <!-- アイコン (小サイズ) -->
  <g transform="translate(560, 120)">
    <rect width="80" height="80" rx="14" fill="#7C3AED"/>
    <g stroke="white" stroke-linecap="round" stroke-linejoin="round" fill="none">
      <line x1="20" y1="60" x2="52" y2="28" stroke-width="4.5"/>
      <line x1="16" y1="50" x2="30" y2="64" stroke-width="3.5"/>
      <polygon points="52,28 57,21 63,19 61,25 59,31" fill="white" stroke="none"/>
      <line x1="60" y1="60" x2="28" y2="28" stroke-width="4.5"/>
      <line x1="64" y1="50" x2="50" y2="64" stroke-width="3.5"/>
      <polygon points="28,28 23,21 17,19 19,25 21,31" fill="white" stroke="none"/>
    </g>
  </g>

  <!-- メインタイトル -->
  <text
    x="600"
    y="310"
    text-anchor="middle"
    font-family="'Arial Black', 'Helvetica Neue', Arial, sans-serif"
    font-size="96"
    font-weight="900"
    letter-spacing="8"
    fill="white"
  >SMASH TRACKER</text>

  <!-- パープルのアンダーライン -->
  <rect x="200" y="330" width="800" height="3" fill="#7C3AED"/>

  <!-- サブタイトル -->
  <text
    x="600"
    y="410"
    text-anchor="middle"
    font-family="'Noto Sans JP', 'Hiragino Kaku Gothic ProN', 'Yu Gothic', sans-serif"
    font-size="32"
    font-weight="400"
    letter-spacing="4"
    fill="#A78BFA"
  >スマブラ対戦戦績管理アプリ</text>

  <!-- 下部キャッチコピー -->
  <text
    x="600"
    y="510"
    text-anchor="middle"
    font-family="'Noto Sans JP', 'Hiragino Kaku Gothic ProN', 'Yu Gothic', sans-serif"
    font-size="22"
    font-weight="300"
    letter-spacing="2"
    fill="#6B7280"
  >対戦戦績を記録・分析して強くなろう</text>
</svg>
