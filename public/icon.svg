<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <rect width="512" height="512" rx="96" ry="96" fill="#111111"/>
  <g transform="translate(256,256)" stroke="white" stroke-linecap="round" stroke-linejoin="round" fill="none">
    <!-- Sword 1: bottom-left to top-right -->
    <line x1="-80" y1="80" x2="80" y2="-80" stroke-width="24"/>
    <!-- Guard 1 -->
    <line x1="-100" y1="40" x2="-40" y2="100" stroke-width="18"/>
    <!-- Blade tip 1 -->
    <circle cx="90" cy="-90" r="14" fill="white" stroke="none"/>

    <!-- Sword 2: bottom-right to top-left -->
    <line x1="80" y1="80" x2="-80" y2="-80" stroke-width="24"/>
    <!-- Guard 2 -->
    <line x1="100" y1="40" x2="40" y2="100" stroke-width="18"/>
    <!-- Blade tip 2 -->
    <circle cx="-90" cy="-90" r="14" fill="white" stroke="none"/>
  </g>
</svg>
